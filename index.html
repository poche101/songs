<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Of Songs - PA Onwumere</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        .hero-section {
            /* Updated path to assets/images/pa.jpg */
            background: linear-gradient(rgba(8, 30, 54, 0.7), rgba(8, 30, 54, 0.7)), 
                        url('assets/images/pa.jpg') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        .btn-download {
            transition: transform 0.3s ease;
        }
        .btn-download:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="glass-box text-center shadow-lg">
        <h1 class="display-5 fw-bold mb-3">Service Of Songs</h1>
        <p class="lead mb-4">In Memory of PA Onwumere</p>
        
        <a id="pdfDownload" 
           href="assets/doc/pa-onwumere.pdf" 
           download="PA_Onwumere_Service_of_Songs.pdf"
           type="application/pdf"
           class="btn btn-light btn-lg px-5 rounded-pill fw-bold btn-download">
            Download Program (PDF)
        </a>
        
        <p class="mt-4 small opacity-50">Your download will begin shortly...</p>
    </div>
</div>

<script>
    window.addEventListener('load', function() {
        // 1.5 second delay to ensure the page and background are rendered
        setTimeout(function() {
            const link = document.getElementById('pdfDownload');
            if(link) {
                // Create a simulated click event to bypass potential browser blocks
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true
                });
                link.dispatchEvent(clickEvent);
                console.log("Download triggered automatically.");
            }
        }, 1500);
    });
</script>

</body>
</html>
